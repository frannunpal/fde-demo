<!doctype html>
<html lang="en">
  <head>
    <script>
      window.__FDE_IN_DOCKER__ = false;
      window.__IS_DEV__ = false;
    </script>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="%BASE_URL%favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="%BASE_URL%favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%BASE_URL%apple-touch-icon.png"
    />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a2e" />

    <!-- Primary Meta Tags -->
    <title>FDE Desktop - Web Desktop Environment</title>
    <meta name="title" content="FDE Desktop - Web Desktop Environment" />
    <meta
      name="description"
      content="A web-based desktop environment built with React, TypeScript, and Mantine. Run desktop apps in your browser."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://frannunpal.github.io/" />
    <meta property="og:title" content="FDE Desktop - Web Desktop Environment" />
    <meta
      property="og:description"
      content="A web-based desktop environment built with React, TypeScript, and Mantine. Run desktop apps in your browser."
    />
    <meta
      property="og:image"
      content="https://frannunpal.github.io/og-image.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://frannunpal.github.io/" />
    <meta
      name="twitter:title"
      content="FDE Desktop - Web Desktop Environment"
    />
    <meta
      name="twitter:description"
      content="A web-based desktop environment built with React, TypeScript, and Mantine. Run desktop apps in your browser."
    />
    <meta
      name="twitter:image"
      content="https://frannunpal.github.io/og-image.png"
    />

    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #1a1a2e;
        color: rgba(255, 255, 255, 0.87);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        z-index: 10000;
        transition: opacity 0.15s ease-out;
      }
      #initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255, 255, 255, 0.15);
        border-top-color: #339af0;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .loader-text {
        margin-top: 16px;
        font-size: 14px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-color-scheme: light) {
        #initial-loader {
          background-color: #f8f9fa;
          color: #495057;
        }
        .loader-spinner {
          border-color: rgba(0, 0, 0, 0.15);
          border-top-color: #339af0;
        }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-spinner"></div>
      <div class="loader-text">Loading...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
